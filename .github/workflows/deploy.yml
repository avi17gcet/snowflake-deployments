name: Snowflake CI/CD Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: TEST

    env:
      SNOWFLAKE_CONNECTIONS_DEFAULT_HOST: ${{ secrets.SF_HOST }}
      SNOWFLAKE_CONNECTIONS_DEFAULT_USER: ${{ secrets.SF_USER }}
      SNOWFLAKE_CONNECTIONS_DEFAULT_AUTHENTICATOR: snowflake
      SNOWFLAKE_CONNECTIONS_DEFAULT_TOKEN: ${{ secrets.SF_PAT }}
      SNOWFLAKE_CONNECTIONS_DEFAULT_ROLE: ${{ secrets.SF_ROLE }}
      SNOWFLAKE_CONNECTIONS_DEFAULT_WAREHOUSE: ${{ secrets.SF_WAREHOUSE }}
      SNOWFLAKE_CONNECTIONS_DEFAULT_DATABASE: ${{ secrets.SF_DATABASE }}
      SNOWFLAKE_CONNECTIONS_DEFAULT_SCHEMA: ${{ secrets.SF_SCHEMA }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Snowflake CLI
        run: pip install --upgrade snowflake-cli

      - name: Test Snowflake Connection
        run: snow connection test --connection default

      - name: Deploy SQL Scripts
        run: |
          set -e
          for file in sql/schemas/*.sql; do
            echo "Deploying $file..."
            snow sql -f "$file" --connection default
          done