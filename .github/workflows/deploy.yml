name: Snowflake Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Configure Snowflake Connection
        run: |
          snow connection add github_connection \
            --account "${{ secrets.SNOWFLAKE_ACCOUNT }}" \
            --user "${{ secrets.SNOWFLAKE_USER }}" \
            --password "${{ secrets.SNOWFLAKE_PASSWORD }}" \
            --role "${{ secrets.SNOWFLAKE_ROLE }}" \
            --warehouse "${{ secrets.SNOWFLAKE_WAREHOUSE }}" \
            --database "${{ secrets.SNOWFLAKE_DATABASE }}" \
            --default

      - name: Test Connection
        run: snow sql -q "SELECT CURRENT_VERSION();"

      - name: Deploy Schema
        run: snow sql -f sql/schemas/create_schema.sql

      - name: Deploy Tables
        run: snow sql -f sql/schemas/create_table.sql