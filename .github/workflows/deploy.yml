name: Snowflake CI/CD Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2 — Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3 — Install Snowflake CLI
      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      # Step 4 — Configure Snowflake Connection using Secrets
      - name: Configure Snowflake Connection
        run: |
          snow connection add TEST \
            --account "${{ secrets.SNOWFLAKE_ACCOUNT }}" \
            --user "${{ secrets.SNOWFLAKE_USER }}" \
            --password "${{ secrets.SNOWFLAKE_PASSWORD }}" \
            --role "${{ secrets.SNOWFLAKE_ROLE }}" \
            --warehouse "${{ secrets.SNOWFLAKE_WAREHOUSE }}" \
            --database "${{ secrets.SNOWFLAKE_DATABASE }}" \
            --default

      # Step 5 — Test the connection
      - name: Test Snowflake Connection
        run: snow sql -c TEST -q "SELECT CURRENT_DATABASE(), CURRENT_SCHEMA(), CURRENT_ROLE();"

      # Step 6 — Deploy all SQL scripts in the folder
      - name: Deploy All SQL Scripts in Folder
        run: |
          set -e
          echo "Deploying all SQL scripts from sql/schemas/"
          for file in sql/schemas/*.sql; do
            echo "Executing $file ..."
            snow sql -c TEST -f "$file" --verbose
          done