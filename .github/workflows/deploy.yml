name: Snowflake CI/CD Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Configure Snowflake Connection
        run: |
          snow connection add \
            -n TEST \
            -a "${{ secrets.TEST_ACCOUNT }}" \
            -u "${{ secrets.TEST_USER }}" \
            -p "${{ secrets.TEST_PASSWORD }}" \
            -r "${{ secrets.TEST_ROLE }}" \
            -w "${{ secrets.TEST_WAREHOUSE }}" \
            -d "${{ secrets.TEST_DATABASE }}" \
            --default

      - name: Test Snowflake Connection
        run: snow sql -c TEST -q "SELECT CURRENT_DATABASE(), CURRENT_SCHEMA(), CURRENT_ROLE();"

      - name: Deploy All SQL Scripts in Folder
        run: |
          set -e
          echo "Deploying all SQL scripts from sql/schemas/"
          for file in sql/schemas/*.sql; do
            echo "Executing $file ..."
            snow sql -c TEST -f "$file" --verbose
          done