name: Snowflake CI/CD Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: TEST
      steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Snowflake CLI
        run: pip install --upgrade snowflake-cli

      # ✅ Create secure config.toml
      - name: Create Snowflake config file
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/config.toml <<EOF
          default_connection_name = "my_connection"

          [connections.my_connection]
          account = "${{ secrets.SF_ACCOUNT }}"
          user = "${{ secrets.SF_USER }}"
          password = "${{ secrets.SF_PASSWORD }}"
          role = "${{ secrets.SF_ROLE }}"
          warehouse = "${{ secrets.SF_WAREHOUSE }}"
          database = "${{ secrets.SF_DATABASE }}"
          schema = "${{ secrets.SF_SCHEMA }}"
          EOF

          # 🔒 FIX PERMISSIONS (required by Snowflake)
          chmod 600 ~/.snowflake/config.toml

      - name: Test Snowflake Connection
        run: snow connection test --connection my_connection

      - name: Deploy SQL Scripts
        run: |
          set -e
          for file in sql/schemas/*.sql; do
            echo "Deploying $file..."
            snow sql -f "$file" --connection my_connection
          done