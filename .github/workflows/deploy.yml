name: Snowflake CI/CD Deployment

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: TEST

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Snowflake CLI
        run: pip install snowflake-cli

      # 🔥 Explicitly create connection
      - name: Create Snowflake Connection
        run: |
          snow connection add default \
            --account "${{ secrets.SF_ACCOUNT }}" \
            --user "${{ secrets.SF_USER }}" \
            --password "${{ secrets.SF_PASSWORD }}" \
            --role "${{ secrets.SF_ROLE }}" \
            --warehouse "${{ secrets.SF_WAREHOUSE }}" \
            --database "${{ secrets.SF_DATABASE }}" \
            --schema "${{ secrets.SF_SCHEMA }}"

      - name: Test Snowflake Connection
        run: snow connection test --connection default

      - name: Deploy SQL Scripts
        run: |
          set -e
          for file in sql/schemas/*.sql; do
            echo "Deploying $file..."
            snow sql -f "$file" --connection default
          done